name: Mirror to Grok_Kory_Personal_MB

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Grok_Kory_Personal_MB
        run: |
          git remote add kory https://x-access-token:${{ secrets.KORY_PAT }}@github.com/simplebiscuits/Grok_Kory_Personal_MB.git
          git push kory main --force
